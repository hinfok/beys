<script>

var DATA, curCat='Blade', ALL={};

// parts.json cache (localStorage, 1hr expiry)
async function loadPartsData(url){
  try{
    var key="beys_parts_"+url;
    var ls=typeof localStorage!="undefined"?localStorage:null;
    if(ls){try{var cached=ls.getItem(key);if(cached){var d=JSON.parse(cached);if(d._ts&&Date.now()-d._ts<3600000) return d.data;}}catch(e){}}
    var r=await fetch(url,{cache:"force-cache"});var data=await r.json();
    if(ls){try{ls.setItem(key,JSON.stringify({_ts:Date.now(),data:data}));}catch(e){}}
    return data;
  }catch(e){return await(await fetch(url)).json();}
}
async function init(){
  try{
    DATA=await loadPartsData('data/parts.json?v=11');
    buildTabs();
    loadCat('Blade');
  }catch(e){console.error('Beypedia init error:',e);var g=document.getElementById('g');if(g)g.innerHTML='<p style="padding:40px;text-align:center;color:var(--mut)">載入失敗，請重新整理頁面</p>';}
}

function buildTabs(){
  var zh={'Series':'系列','Blade':'鋼鐵戰刃 (Blade)','Ratchet':'固鎖輪盤 (Ratchet)','Bit':'軸心 (Bit)','LockChip':'紋章鎖 (Lock)','MainBlade':'主要戰刃 (Main)','OverBlade':'超越戰刃 (Over)','MetalBlade':'金屬刃 (Metal)','AssistBlade':'輔助刃 (Assist)'};
  var h='',first=true;
  Object.keys(DATA.categories).forEach(function(k){
    if(DATA.categories[k].length===0) return;
    h+='<button class="'+(first?'ac':'')+'" onclick="switchCat(\''+k+'\',this)">'+(zh[k]||k)+' <span style="font-size:9px;opacity:.7">('+DATA.categories[k].length+')</span></button>';
    first=false;
  });
  document.getElementById('tab').innerHTML=h;
}

function switchCat(c,el){
  curCat=c; cv=''; cr=''; cs='';
  document.querySelectorAll('.tab button').forEach(function(b){b.classList.remove('ac')});
  el.classList.add('ac');
  loadCat(c);
}

function loadCat(c){
  ALL=DATA.categories[c]||[];
  document.getElementById('q').value='';
  buildSubFilters();
  render();
}

function render(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  var items=ALL;
  if(q) items=items.filter(function(d){
    return (d.name||'').toLowerCase().includes(q)||
           (d.id||'').toLowerCase().includes(q)||
           (d.type||'').toLowerCase().includes(q)||
           (d.baseSet||'').toLowerCase().includes(q)||
           (d.variant||'').toLowerCase().includes(q);
  });
  if(cv) items=items.filter(function(d){return d.baseSet&&d.baseSet.startsWith(cv);});
  if(cr) items=items.filter(function(d){return (d.rotation||'Right')===cr;});
  if(cs==='weight') items=items.slice().sort(function(a,b){return (b.weight||0)-(a.weight||0);});
  else if(cs) items=items.slice().sort(function(a,b){return (b.stats[cs]||0)-(a.stats[cs]||0);});
  
  var el=document.getElementById('g');
  document.getElementById('cnt').textContent=items.length+' 個零件';
  if(!items.length){el.innerHTML='<p style="padding:40px;text-align:center;color:var(--mut)">搵唔到</p>';return;}
  
  var h='';
  items.forEach(function(d){
    var tc='var(--'+(d.type==='Attack'?'atk':d.type==='Defense'?'def':d.type==='Stamina'?'stm':'bal')+')';
    var img=d.image?'<img src="'+d.image+'" alt="" loading="lazy">':'<span style="font-size:20px;opacity:.2;font-weight:900">'+(d.name||'??').substring(0,2)+'</span>';
    var st='';
    ['attack','defense','stamina','dash','burst'].forEach(function(k){
      var v=d.stats[k]||0;
      st+='<div class="r"><span class="l">'+k.substring(0,3)+'</span><div class="b"><div class="f" style="width:'+v+'%;background:var(--'+(k==='attack'?'atk':k==='defense'?'def':k==='stamina'?'stm':k==='dash'?'bal':'atk')+')"></div></div><span class="v">'+v+'</span></div>';
    });
    h+='<a href="part.html?id='+d.id+'" class="bc" onclick="showModal(\''+d.id+'\');return false"><div class="bci" style="background:'+tc+'">'+img+'<span class="rt">'+(d.rotation==='Left'?'L':'R')+'</span><span class="ct" style="background:'+tc+'">'+d.type+'</span></div><div class="bcb"><div class="nm">'+d.name+' <i style="font-size:9px;color:var(--mut);display:block">'+d.baseSet+(d.variant?' &middot; '+d.variant:'')+'</i></div><div class="sb">'+st+'</div></div></div>';
  });
  el.innerHTML=h;
}

function showModal(id){
  // Find part in current category
  var d=ALL.find(function(p){return p.id===id;});
  if(!d) return;
  
  var m=document.getElementById('mc');
  var tc='var(--'+(d.type==='Attack'?'atk':d.type==='Defense'?'def':d.type==='Stamina'?'stm':'bal')+')';
  var img=d.image?'<img src="'+d.image+'" alt="" style="max-width:100%;max-height:250px">':'<div style="padding:40px;color:var(--mut)">No image</div>';
  
  var st='';
  ['attack','defense','stamina','dash','burst'].forEach(function(k){
    var v=d.stats[k]||0;
    st+='<div class="r"><span class="l">'+k.substring(0,3)+'</span><div class="b"><div class="f" style="width:'+v+'%;background:var(--'+(k==='attack'?'atk':k==='defense'?'def':k==='stamina'?'stm':k==='dash'?'bal':'atk')+')"></div></div><span class="v">'+v+'</span></div>';
  });
  
  // 相關零件（同系列）
  var rp='';
  var links=DATA.seriesMap[id]||[];
  if(links.length){
    rp='<div style="margin:10px 0;font-size:12px;color:var(--mut);font-weight:600">Related parts from series:</div><div class="rp">';
    links.forEach(function(l){
      var bs=l.bs||'';
      if(l.l && DATA.categories.Blade){ // this is the blade
        var p=DATA.categories.Blade.find(function(x){return x.id===l.l;});
        if(p) rp+=partThumb(p,'Blade');
      }
      if(l.r && DATA.categories.Ratchet){
        var p=DATA.categories.Ratchet.find(function(x){return x.id===l.r;});
        if(p) rp+=partThumb(p,'Ratchet');
      }
      if(l.b && DATA.categories.Bit){
        var p=DATA.categories.Bit.find(function(x){return x.id===l.b;});
        if(p) rp+=partThumb(p,'Bit');
      }
    });
    rp+='</div>';
  }
  
  // Product image
  var pi='';
  if(links.length && links[0].bs){
    var bs=links[0].bs;
    var prodData=DATA.productImages[bs];
    if(prodData) pi='<div style="text-align:center;margin:10px 0"><img src="'+prodData+'" alt="" style="max-width:100%;max-height:150px;border-radius:6px"></div>';
  }
  
  var amz='https://www.amazon.com/s?k=Beyblade+X+'+encodeURIComponent(d.name)+'&tag=hinfok-20';
  var eb='https://www.ebay.com/sch/i.html?_nkw=Beyblade+X+'+encodeURIComponent(d.name)+'&campid=5339157670&mkcid=1&mkevt=1';
  
  m.innerHTML='<span class="cl" onclick="closeModal()">&times;</span><div class="imn">'+img+'</div><h2>'+d.name+'</h2><div style="font-size:12px;color:var(--mut);margin-bottom:6px">'+d.baseSet+(d.variant?' &middot; '+d.variant:'')+'</div><div class="tgs"><span style="background:'+tc+'">'+d.type+'</span><span style="background:'+(d.rotation==='Left'?'var(--stm)':'var(--atk)')+'">'+(d.rotation==='Left'?'Left':'Right')+'</span>'+(d.weight?'<span style="background:var(--bal)">'+d.weight+'g</span>':'')+'</div><div class="st2">'+st+'</div>'+pi+rp+'<div class="buy"><a class="az" href="'+amz+'" target="_blank">Amazon 購買</a><a class="eb" href="'+eb+'" target="_blank">eBay 購買</a></div><div style="text-align:center;margin-top:8px"><a class="btl" href="part.html?id='+d.id+'&cat='+curCat+'">詳細資料 &rarr;</a></div>';
  
  try{if(DATA.products&&d.baseSet&&DATA.products[d.baseSet]){
    var _p=DATA.products[d.baseSet];var _d=document.createElement('div');
    _d.style.cssText='margin:8px 0;padding:8px;border:1px solid var(--bdr);border-radius:6px;font-size:11px;color:var(--mut)';
    if(_p.url)_d.innerHTML='<a href='+_p.url+' target=_blank style=color:var(--atk);text-decoration:none>Link -&gt;</a>';
    var _b=m.querySelector('.buy');if(_b)m.insertBefore(_d,_b);
  }}catch(ex){}
  document.getElementById('modal').classList.add('vis');
}

function partThumb(p,cat){
  var img=p.image?'<img src="'+p.image+'" alt="">':'<div class="pi2">'+cat.substring(0,3)+'</div>';
  var tc='var(--'+(p.type==='Attack'?'atk':p.type==='Defense'?'def':p.type==='Stamina'?'stm':'bal')+')';
  var name=p.name.substring(0,10)+(p.name.length>10?'...':'');
  return '<div class="pi" onclick="showModal(\''+p.id+'\')" title="'+p.name+'">'+img+'<div style="font-size:7px;text-align:center;padding:1px;background:'+tc+'">'+name+'</div></a>';
}

function closeModal(){document.getElementById('modal').classList.remove('vis');}

var cv='', cr='', cs='', _tv=false;

function buildSubFilters(){
  var vers={};
  if(!DATA) return;
  (DATA.categories[curCat]||[]).forEach(function(b){
    var v=(b.baseSet||'').replace(/\d.*$/,'');
    if(v) vers[v]=1;
  });
  var h='<span style="color:var(--mut);font-size:9px">版本</span><button class="fb'+(cv===''?' ac':'')+'" onclick="setV(this,\'\')">全部</button>';
  Object.keys(vers).sort().forEach(function(v){
    h+='<button class="fb'+(cv===v?' ac':'')+'" onclick="setV(this,\'"+v+"\')">'+v+'</button>';
  });
  var hasRot=(DATA.categories[curCat]||[]).some(function(d){return d.rotation;});
  if(hasRot){
    h+='<span style="color:var(--mut);font-size:9px;margin-left:8px">旋轉</span>';
    h+='<button class="fb'+(cr===''?' ac':'')+'" onclick="setR(this,\'\')">全部</button>';
    h+='<button class="fb'+(cr==='Right'?' ac':'')+'" onclick="setR(this,\'Right\')">右</button>';
    h+='<button class="fb'+(cr==='Left'?' ac':'')+'" onclick="setR(this,\'Left\')">左</button>';
  }
  h+='<span style="color:var(--mut);font-size:9px;margin-left:8px">排序</span><select onchange="setS(this.value)" style="font-size:9px">';
  h+='<option value=""'+(cs===''?' selected':'')+'>預設</option>';
  h+='<option value="attack"'+(cs==='attack'?' selected':'')+'>攻擊</option>';
  h+='<option value="defense"'+(cs==='defense'?' selected':'')+'>防守</option>';
  h+='<option value="stamina"'+(cs==='stamina'?' selected':'')+'>持久</option>';
  h+='<option value="dash"'+(cs==='dash'?' selected':'')+'>加速</option>';
  h+='<option value="burst"'+(cs==='burst'?' selected':'')+'>耐久</option>';
  h+='<option value="weight"'+(cs==='weight'?' selected':'')+'>重量</option></select>';
  h+='<span class="fb" onclick="_tv=!_tv;document.getElementById(\'g\').classList.toggle(\'tbl\',_tv);this.classList.toggle(\'ac\')" style="margin-left:auto;cursor:pointer">📋 表</span>';
  document.getElementById('fltB').innerHTML=h;
}
function setV(el,v){cv=v;document.querySelectorAll('#fltB .fb[data-v]').forEach(function(b){b.classList.remove('ac')});if(v)el.classList.add('ac');buildSubFilters();render();}
function setR(el,v){cr=v;document.querySelectorAll('#fltB .fb[data-r]').forEach(function(b){b.classList.remove('ac')});if(v)el.classList.add('ac');buildSubFilters();render();}
function setS(v){cs=v;render();}

function openLightbox(s){document.getElementById('lbImg').src=s;document.getElementById('lightbox').classList.add('vis');}
document.getElementById('q').addEventListener('input',render);
init();
</script>

document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll(".dr").forEach(function(d){var dc=d.querySelector(".dc");if(!dc)return;d.addEventListener("mouseenter",function(){dc.style.display="block"});d.addEventListener("mouseleave",function(){dc.style.display="none"});});});
</script>
