.res .rc:hover{border-color:var(--atk)}
.res .rc img{width:100%;height:80px;object-fit:contain;display:block}
.res .rc .rn{font-size:10px;font-weight:700;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cmp .cc .rmv:hover{color:var(--atk)}

.cmp .cc .ci{padding:6px 8px}
.cmp .cc .ci .cn{font-size:12px;font-weight:700}
.cmp .cc .ci .cs{font-size:9px;color:var(--mut)}
.cmp .cc .ci .ct{font-size:10px;margin-top:2px;font-weight:600}

<script>
var DATA, selected=[],allParts=[];

// parts.json cache (localStorage, 1hr expiry)
async function loadPartsData(url){
  try{
    var key="beys_parts_"+url;
    var ls=typeof localStorage!="undefined"?localStorage:null;
    if(ls){try{var cached=ls.getItem(key);if(cached){var d=JSON.parse(cached);if(d._ts&&Date.now()-d._ts<3600000) return d.data;}}catch(e){}}
    var r=await fetch(url,{cache:"force-cache"});var data=await r.json();
    if(ls){try{ls.setItem(key,JSON.stringify({_ts:Date.now(),data:data}));}catch(e){}}
    return data;
  }catch(e){return await(await fetch(url)).json();}
}
async function init(){
  try{
    var r=await fetch("data/parts.json");
    DATA=await r.json();
    for(var c in DATA.categories){
      DATA.categories[c].forEach(function(p){p._cat=c;allParts.push(p);});
    }
    renderUI();
  }catch(e){document.getElementById("main").innerHTML="<p style=\"padding:40px;text-align:center;color:var(--mut)\">載入錯誤: "+e.message+"</p>";}
}

function renderUI(){
  var html="<h1>📊 零件對比</h1><p class=\"note\">搜尋並加入最多 4 個零件進行對比，點按加入，按 ✕ 移除</p>";
  html+="<div class=\"sr\"><input type=\"text\" id=\"sq\" placeholder=\"搜尋零件名稱...\" oninput=\"search()\"><select id=\"sc\" onchange=\"search()\"><option value=\"\">全部分類</option>";
  Object.keys(DATA.categories).forEach(function(k){html+="<option value=\""+k+"\">"+k+"</option>";});
  html+="</select><span style=\"font-size:11px;color:var(--mut);align-self:center\">已選: "+selected.length+"/4</span></div>";
  html+="<div id=\"sres\" class=\"res\"></div>";
  html+="<div id=\"cmp\" class=\"cmp\"></div>";
  document.getElementById("main").innerHTML=html;
  renderCompare();
}

function search(){
  var q=document.getElementById("sq").value.trim().toLowerCase();
  var cat=document.getElementById("sc").value;
  var filtered=allParts;
  if(cat) filtered=filtered.filter(function(p){return p._cat===cat;});
  if(q) filtered=filtered.filter(function(p){return (p.name||"").toLowerCase().includes(q)||(p.id||"").toLowerCase().includes(q)||(p.baseSet||"").toLowerCase().includes(q);});
  var html="";
  filtered.slice(0,60).forEach(function(p){
    var sel=selected.some(function(s){return s.id===p.id;});
    if(sel) return;
    var img=p.image?"<img src=\""+p.image+"\" alt=\"\">":"<div style=\"height:80px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mut)\">無圖</div>";
    html+="<div class=\"rc\" onclick=\"addPart('"+p.id+"')\">"+img+"<div class=\"rn\">"+p.name+"</div><div style=\"font-size:8px;color:var(--mut);padding:0 5px 4px\">"+p._cat+"</div></div>";
  });
  if(!html) html="<p style=\"color:var(--mut);font-size:12px;grid-column:1/-1\">搵唔到/已全部加入</p>";
  document.getElementById("sres").innerHTML=html;
}

function addPart(id){
  if(selected.length>=4) return;
  var found=allParts.find(function(p){return p.id===id;});
  if(!found||selected.some(function(s){return s.id===id;})) return;
  selected.push(found);
  search();
  renderCompare();
}

function removePart(id){
  selected=selected.filter(function(s){return s.id!==id;});
  search();
  renderCompare();
}

function renderCompare(){
  var el=document.getElementById("cmp");
  if(!el) return;
  if(selected.length===0){el.innerHTML="<p style=\"color:var(--mut);font-size:13px;grid-column:1/-1\">在上方搜尋並加入零件作對比</p>";return;}
  var sc={attack:"atk",defense:"def",stamina:"stm",dash:"bal",burst:"atk"};
  var zh={attack:"攻擊",defense:"防禦",stamina:"持久",dash:"加速",burst:"耐久"};
  var keys=["attack","defense","stamina","dash","burst"];
  var html="";
  selected.forEach(function(p){
    var tc="var(--"+(p.type==="Attack"?"atk":p.type==="Defense"?"def":p.type==="Stamina"?"stm":"bal")+")";
    var img=p.image?"<img src=\""+p.image+"\" alt=\"\">":"<div style=\"height:110px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut)\">無圖</div>";
    var best=0;
    keys.forEach(function(k){var v=p.stats[k]||0;if(v>best)best=v;});
    html+="<div class=\"cc\"><span class=\"rmv\" onclick=\"removePart('"+p.id+"')\">✕</span>"+img+"<div class=\"ci\"><div class=\"cn\">"+p.name+"</div><div class=\"cs\">"+p._cat+" · "+p.baseSet+(p.variant?" · "+p.variant:"")+"</div><div class=\"ct\" style=\"color:"+(p.type==="Attack"?"var(--atk)":p.type==="Defense"?"var(--def)":p.type==="Stamina"?"var(--stm)":"var(--bal)")+"\">"+p.type+(p.rotation?" · "+p.rotation:"")+(p.weight?" · "+p.weight+"g":"")+"</div>";
    keys.forEach(function(k){
      var v=p.stats[k]||0;
      html+="<div class=\"cr\"><span class=\"cl\">"+zh[k]+"</span><div class=\"cb\"><div class=\"cf\" style=\"width:"+v+"%;background:var(--"+sc[k]+")\"></div></div><span class=\"cv\">"+v+"</span></div>";
    });
    html+="</div></div>";
  });
  el.innerHTML=html;
}

init();
</script>
