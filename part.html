<script>
var DATA;
// parts.json cache (localStorage, 1hr expiry)
async function loadPartsData(url){
  try{
    var key="beys_parts_"+url;
    var ls=typeof localStorage!="undefined"?localStorage:null;
    if(ls){try{var cached=ls.getItem(key);if(cached){var d=JSON.parse(cached);if(d._ts&&Date.now()-d._ts<3600000) return d.data;}}catch(e){}}
    var r=await fetch(url,{cache:"force-cache"});var data=await r.json();
    if(ls){try{ls.setItem(key,JSON.stringify({_ts:Date.now(),data:data}));}catch(e){}}
    return data;
  }catch(e){return await(await fetch(url)).json();}
}
async function init(){
  try{
    var p=new URLSearchParams(location.search);
    var id=p.get("id")||"";
    var cat=p.get("cat")||"";
    var r=await fetch("data/parts.json");DATA=await r.json();
    var d=null;
    if(cat&&DATA.categories[cat]) d=DATA.categories[cat].find(function(x){return x.id===id;});
    if(!d) for(var c in DATA.categories){d=DATA.categories[c].find(function(x){return x.id===id;});if(d) break;}
    if(!d){document.getElementById("content").innerHTML="<p style=\"padding:40px;text-align:center;color:var(--mut)\">找不到零件</p>";return;}
    render(d);
  }catch(e){document.getElementById("content").innerHTML="<p style=\"padding:40px;text-align:center;color:var(--mut)\">錯誤: "+e.message+"</p>";}
}

function genShare(d){

  var txt=encodeURIComponent(d.name+" · Beyblade X · Beypedia");
  var sh=document.getElementById("share");
  if(!sh) return;
  sh.innerHTML=
    '<a class="fb" href="https://www.facebook.com/sharer/sharer.php?u='+url+'" target="_blank">📘 Facebook</a>'+
    '<a class="wa" href="https://wa.me/?text='+txt+'%20'+url+'" target="_blank">💬 WhatsApp</a>'+
    '<a class="ln" href="https://line.me/R/msg/text/?'+txt+'%20'+url+'" target="_blank">🟢 Line</a>'+
    '<a class="tw" href="https://twitter.com/intent/tweet?text='+txt+'&url='+url+'" target="_blank">𝕏 Twitter</a>';
}

  var catZh=zhCat[d._cat]||d._cat;

  // SEO: dynamic title, meta, JSON-LD
  var seoTitle = d.name+(nameEn?" ("+nameEn+")":"")+" · Beyblade X "+catZh+" · Beypedia";
  document.title = seoTitle;
  var desc = d.name+(nameEn?" ("+nameEn+")":"")+" "+catZh+"："+(zhType[d.type]||d.type)+"、攻擊"+(d.stats.attack||0)+"、防禦"+(d.stats.defense||0)+"、持久"+(d.stats.stamina||0)+"、重量"+(d.weight||"?" )+"g。完整 Beyblade X 爆旋陀螺零件數值與購買連結。";
  document.getElementById("seoDesc").content=desc;
  document.getElementById("seoTitle").textContent=seoTitle;
  document.getElementById("seoKw").content="Beyblade X,"+d.name+","+nameEn+","+d.baseSet+",爆旋陀螺,零件,"+catZh+","+zhType[d.type];
  document.getElementById("ogTitle").content=seoTitle;
  document.getElementById("ogDesc").content=desc;
  var url="https://beys.hinfok.com/part.html?id="+d.id;
  document.getElementById("seoCanonical").href=url;
  document.getElementById("ogUrl").content=url;
  document.getElementById("seoLd").textContent=JSON.stringify({"@context":"https://schema.org","@type":"Product","name":d.name+(nameEn?" ("+nameEn+")":""),"description":desc,"category":d._cat,"sku":d.id,"brand":{"@type":"Brand","name":"TAKARA TOMY"},"offers":{"@type":"Offer","url":"https://www.amazon.com/s?k=Beyblade+X+"+kwName+"&tag=hinfok-20","availability":"https://schema.org/InStock"}});

  // Breadcrumb
  document.getElementById("bcPart").innerHTML=" › <a href=\"/?cat="+d._cat+"\">"+catZh+"</a> › "+d.name;

  var tc="var(--"+(d.type==="Attack"?"atk":d.type==="Defense"?"def":d.type==="Stamina"?"stm":"bal")+")";
  var img=d.image?"<img src=\""+d.image+"\" alt=\""+d.name+" Beyblade X "+catZh+"\">":"<div style=\"height:200px;display:flex;align-items:center;justify-content:center;color:var(--mut)\">暫無圖片</div>";
  var prodImg=DATA.productImages[d.baseSet]?"<div class=\"prodi\"><img src=\""+DATA.productImages[d.baseSet]+"\" alt=\""+d.baseSet+" Beyblade X 產品\"></div>":"";

  var st="";
  var sc={attack:"atk",defense:"def",stamina:"stm",dash:"bal",burst:"atk"};
  Object.keys(sc).forEach(function(k){var v=d.stats[k]||0;st+='<div class="r"><span class="l">'+({attack:"攻擊",defense:"防禦",stamina:"持久",dash:"加速",burst:"耐久"}[k]||k)+'</span><div class="b"><div class="f" style="width:'+v+'%;background:var(--'+sc[k]+')"></div></div><span class="v">'+v+'</span></div>';});

  var rp="";
  var links=DATA.seriesMap[d.id]||[];
  if(links.length){
    rp="<h2>相關零件</h2><div class=\"rp\">";
    links.forEach(function(l){["blade","ratchet","bit"].forEach(function(key){var id2=l[key];if(!id2||id2===d.id) return;var found=null;for(var c in DATA.categories){found=DATA.categories[c].find(function(x){return x.id===id2;});if(found) break;}if(found){var img2=found.image?"<img src=\""+found.image+"\" alt=\""+found.name+"\">":"<div style=\"height:90px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut)\">"+found.name.substring(0,4)+"</div>";rp+='<a class="pi2" href="part.html?id='+found.id+'">'+img2+'<div style="background:var(--'+(found.type==="Attack"?"atk":found.type==="Defense"?"def":found.type==="Stamina"?"stm":"bal")+')">'+found.name+'</div></a>';}});});rp+="</div>";
  }

  var amz="https://www.amazon.com/s?k=Beyblade+X+"+encodeURIComponent(d.name)+"&tag=hinfok-20";
  var eb="https://www.ebay.com/sch/i.html?_nkw=Beyblade+X+"+encodeURIComponent(d.name)+"&campid=5339157670&mkcid=1&mkevt=1";

  document.getElementById("content").innerHTML=
    '<h1>'+d.name+(nameEn?" <span style="font-size:14px;font-weight:400;color:var(--mut)">("+nameEn+")</span>":"")+'</h1>'+
    '<div class="sub">'+catZh+' · '+(zhType[d.type]||d.type)+' · '+d.baseSet+(d.variant?" · "+d.variant:"")+' · '+(d.weight?d.weight+"g":"")+'</div>'+
    '<div class="pi">'+img+'</div>'+prodImg+'<h2>數值</h2><div class="st">'+st+'</div>'+rp+'<div class="sh" id="share"></div>'+'<div class="buy"><a class="az" href="'+amz+'" target="_blank" rel="nofollow sponsored">🛒 Amazon 購買</a><a class="eb" href="'+eb+'" target="_blank" rel="nofollow sponsored">🛒 eBay 購買</a></div>';
}

</script>
