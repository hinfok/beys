<script>
var DATA, bladeSel, ratSel, bitSel;

// parts.json cache (localStorage, 1hr expiry)
async function loadPartsData(url){
  try{
    var key="beys_parts_"+url;
    var ls=typeof localStorage!="undefined"?localStorage:null;
    if(ls){try{var cached=ls.getItem(key);if(cached){var d=JSON.parse(cached);if(d._ts&&Date.now()-d._ts<3600000) return d.data;}}catch(e){}}
    var r=await fetch(url,{cache:"force-cache"});var data=await r.json();
    if(ls){try{ls.setItem(key,JSON.stringify({_ts:Date.now(),data:data}));}catch(e){}}
    return data;
  }catch(e){return await(await fetch(url)).json();}
}
async function init(){
  try{
    var r=await fetch("data/parts.json");
    DATA=await r.json();
    renderSelects();
  }catch(e){document.getElementById("main").innerHTML="<p style=\"padding:40px;text-align:center;color:var(--mut)\">載入錯誤: "+e.message+"</p>";}
}

function renderSelects(){
  var cats=["Blade","Ratchet","Bit"];
  var names=["Blade / 刀刃","Ratchet / 棘輪","Bit / 尖"];
  var sq=["","",""];
  var html="<h1>🌀 Combo Builder</h1><p style=\"font-size:13px;color:var(--mut);margin-bottom:16px\">選擇 Blade · Ratchet · Bit 組合，即時睇總數值</p><div class=\"sl\">";
  for(var i=0;i<cats.length;i++){
    var cat=cats[i];
    var parts=DATA.categories[cat]||[];
    html+="<div><label>"+names[i]+"</label><input id=\"sr"+i+"\" type=\"text\" placeholder=\"搜尋...\" oninput=\"filterSel("+i+")\" style=\"padding:5px 8px;border-radius:4px;border:1px solid var(--bdr);background:var(--surface);color:var(--text);font-size:10px;font-family:var(--font);outline:none;width:100%;margin-bottom:4px\"><select id=\"sel"+i+"\" onchange=\"calc()\" style=\"display:block\"><option value=\"\">— 選擇 —</option>";
    for(var j=0;j<parts.length;j++){
      var p=parts[j];
      var label=p.name+(p.variant?" · "+p.variant:"")+" ("+p.baseSet+")";
      html+="<option value=\""+p.id+"\">"+label+"</option>";
    }
    html+="</select></div>";
  }
  html+="</div><div id=\"result\"></div>";
  document.getElementById("main").innerHTML=html;
}


function filterSel(i){
  var q=document.getElementById("sr"+i).value.trim().toLowerCase();
  var cats=["Blade","Ratchet","Bit"];
  var cat=cats[i];
  var parts=DATA.categories[cat]||[];
  var sel=document.getElementById("sel"+i);
  var cur=sel.value;
  sel.innerHTML="<option value=\"\">— 選擇 —</option>";
  parts.forEach(function(p){
    if(q&&!p.name.toLowerCase().includes(q)&&!p.id.toLowerCase().includes(q)&&!(p.baseSet||"").toLowerCase().includes(q)) return;
    var label=p.name+(p.variant?" · "+p.variant:"")+" ("+p.baseSet+")";
    sel.innerHTML+="<option value=\""+p.id+"\""+(p.id===cur?" selected":"")+">"+label+"</option>";
  });
}
function calc(){
  var ids=[],parts=[];
  ["Blade","Ratchet","Bit"].forEach(function(cat,i){
    var sel=document.getElementById("sel"+i);
    if(sel.value){ids.push(sel.value);parts.push(DATA.categories[cat].find(function(p){return p.id===sel.value;}));}
    else{ids.push(null);parts.push(null);}
  });
  if(ids.some(function(id){return id===null;})){
    document.getElementById("result").innerHTML="<p style=\"color:var(--mut);font-size:13px\">揀齊 Blade + Ratchet + Bit 睇 total stats</p>";
    return;
  }
  var res="<div class=\"pr\">";
  ["Blade","Ratchet","Bit"].forEach(function(cat,i){
    var p=parts[i];
    if(!p) return;
    var tc="background:var(--"+(p.type==="Attack"?"atk":p.type==="Defense"?"def":p.type==="Stamina"?"stm":"bal")+")";
    var img=p.image?"<img src=\""+p.image+"\" alt=\"\">":"<div style=\"height:120px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut)\">無圖</div>";
    res+="<div class=\"pc\">"+img+"<div class=\"pn\">"+p.name+"</div><div class=\"ps\">"+p.baseSet+(p.variant?" · "+p.variant:"")+"</div><div style=\"font-size:9px;color:"+(p.type==="Attack"?"var(--atk)":p.type==="Defense"?"var(--def)":p.type==="Stamina"?"var(--stm)":"var(--bal)")+";font-weight:700;padding-bottom:8px\">"+p.type+(p.weight?" · "+p.weight+"g":"")+"</div></div>";
  });
  res+="</div>";
  var stats={attack:0,defense:0,stamina:0,dash:0,burst:0},totalW=0;
  parts.forEach(function(p){if(!p) return;Object.keys(stats).forEach(function(k){stats[k]+=(p.stats[k]||0);});totalW+=(p.weight||0);});
  var sc={attack:"atk",defense:"def",stamina:"stm",dash:"bal",burst:"atk"};
  var zh={attack:"攻擊",defense:"防禦",stamina:"持久",dash:"加速",burst:"耐久"};
  res+='<div class="wt">總重量: <b>'+totalW+'g</b></div><h2>總數值</h2><div class="st">';
  Object.keys(stats).forEach(function(k){
    var maxV=k==="attack"?240:k==="defense"?240:k==="stamina"?240:k==="dash"?240:200;
    res+='<div class="r"><span class="l">'+zh[k]+'</span><div class="b"><div class="f" style="width:'+Math.min(100,stats[k]/maxV*100)+'%;background:var(--'+sc[k]+')"></div></div><span class="v">'+stats[k]+'</span></div>';
  });
  res+="</div>";
  var foundCombo=null;
  var sm=DATA.seriesMap||{};
  for(var key in sm){
    var entries=sm[key];
    for(var ei=0;ei<entries.length;ei++){
      var e=entries[ei];
      if(e.blade===ids[0]&&e.ratchet===ids[1]&&e.bit===ids[2]){foundCombo=e;break;}
    }
    if(foundCombo) break;
  }
  if(foundCombo){
    var bs=foundCombo.bs;
    var prodImg=DATA.productImages[bs];
    var amz="https://www.amazon.com/s?k=Beyblade+X+"+encodeURIComponent(bs)+"&tag=hinfok-20";
    var eb="https://www.ebay.com/sch/i.html?_nkw=Beyblade+X+"+encodeURIComponent(bs)+"&campid=5339157670&mkcid=1&mkevt=1";
    res+="<h2>產品購買</h2><div class=\"mt\">";
    if(prodImg) res+="<img src=\""+prodImg+"\" alt=\"\" style=\"max-width:100%;max-height:150px;display:block;margin-bottom:8px;border-radius:6px\">";
    res+="<div class=\"mk\">此組合對應產品</div><div class=\"mv\">"+bs+"</div><div class=\"buy\" style=\"display:flex;gap:8px;margin-top:10px\"><a class=\"az\" href=\""+amz+"\" target=\"_blank\" style=\"flex:1;text-align:center;padding:10px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;background:#ff9900;color:#000\">Amazon 購買</a><a class=\"eb\" href=\""+eb+"\" target=\"_blank\" style=\"flex:1;text-align:center;padding:10px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;background:#0866FF;color:#fff\">eBay 購買</a></div></div>";
  }
  document.getElementById("result").innerHTML=res;
}

init();
</script>
<script>
document.addEventListener("DOMContentLoaded",function(){var drs=document.querySelectorAll(".dr");drs.forEach(function(d){var dc=d.querySelector(".dc");if(!dc)return;d.addEventListener("mouseenter",function(){dc.style.display="block"});d.addEventListener("mouseleave",function(){dc.style.display="none"});});});
</script>
</body></html>
